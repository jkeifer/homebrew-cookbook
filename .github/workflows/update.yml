name: Update tool

on:
  repository_dispatch:
    types: [update-tool]
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool name (e.g. gribe)"
        required: true
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true

permissions:
  contents: write

jobs:
  bump:
    # arm64 macOS: required to run gribe's aarch64-only binary during the
    # flake build (completion generation runs it) and to validate the pin.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve inputs
        id: vars
        env:
          RAW_TOOL: ${{ github.event.inputs.tool || github.event.client_payload.tool }}
          RAW_TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag }}
        run: |
          set -euo pipefail
          TOOL="$RAW_TOOL"
          TAG="$RAW_TAG"
          if [ -z "$TOOL" ] || [ -z "$TAG" ]; then
            echo "tool and tag are required" >&2
            exit 1
          fi
          {
            echo "tool=$TOOL"
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Recompute hashes and rewrite pins
        env:
          TOOL: ${{ steps.vars.outputs.tool }}
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          SRC="pkgs/$TOOL/source.json"
          FORMULA="Formula/$TOOL.rb"
          REPO=$(jq -r '.repo' "$SRC")
          ASSET=$(jq -r '.asset' "$SRC")
          URL="https://github.com/$REPO/releases/download/$TAG/$ASSET"

          curl -fsSL -o "$ASSET" "$URL"
          HEX=$(shasum -a 256 "$ASSET" | awk '{print $1}')
          SRI="sha256-$(openssl dgst -sha256 -binary "$ASSET" | openssl base64 -A)"

          jq --arg v "$VERSION" --arg s "$SRI" '.version=$v | .sha256=$s' "$SRC" > "$SRC.tmp"
          mv "$SRC.tmp" "$SRC"

          # BSD sed (macOS runner): -i requires a backup-suffix argument.
          sed -i '' -E \
            -e "s#/releases/download/[^/\"]*/$ASSET#/releases/download/$TAG/$ASSET#" \
            -e "s#^  version \"[^\"]+\"#  version \"$VERSION\"#" \
            -e "s#^  sha256 \"[0-9a-f]+\"#  sha256 \"$HEX\"#" \
            "$FORMULA"

          rm -f "$ASSET"

      - name: Validate flake build
        env:
          TOOL: ${{ steps.vars.outputs.tool }}
        run: |
          set -euo pipefail
          # Stage the rewritten pins so the flake evaluation sees them.
          git add "pkgs/$TOOL/source.json" "Formula/$TOOL.rb"
          nix build ".#$TOOL" --print-build-logs
          "./result/bin/$TOOL" version

      - name: Commit bump to main
        env:
          TOOL: ${{ steps.vars.outputs.tool }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No pin changes — already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "bump: $TOOL $VERSION"
          git push origin HEAD:main
